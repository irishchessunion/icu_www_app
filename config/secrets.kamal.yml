# Production-shaped secrets.yml for Kamal-driven deploys.
#
# Baked into the image as /rails/config/secrets.yml by Dockerfile.production.
# The Rails 7.2 shim in config/application.rb loads it via
# config_for(:secrets) at boot, so the existing Rails.application.secrets.*
# call sites keep working.
#
# All values come from environment variables that Kamal injects from
# .kamal/secrets. No real secrets in this file.
#
# Crypt formulas mirror what the existing UPAT deploy uses on the box.

upat: &upat
  secret_key_base: <%= ENV.fetch("SECRET_KEY_BASE") %>
  crypt:
    password: 'Digest::MD5.hexdigest(Digest::MD5.hexdigest("#{salt[0,15]}#{password}#{salt[17,15]}"))'
    verifier: 'Digest::MD5.hexdigest("(" + email.to_s + "|" + created_at.to_s + "|" + id.to_s + ")")[0..9]'
  google:
    simple_api_key: <%= ENV.fetch("GOOGLE_MAPS_API_KEY") %>
  mailgun:
    password: <%= ENV.fetch("MAILGUN_PASSWORD") %>
    secret: <%= ENV.fetch("MAILGUN_SECRET") %>
    public: <%= ENV.fetch("MAILGUN_PUBLIC") %>
  paperclip: <%= ENV.fetch("PAPERCLIP_HASH_SECRET") %>
  ratings_db:
    host: <%= ENV.fetch("RATINGS_DB_HOST", "localhost") %>
    database: <%= ENV.fetch("RATINGS_DB_NAME", "ratings") %>
    username: <%= ENV.fetch("RATINGS_DB_USERNAME", "ratings") %>
    password: <%= ENV.fetch("RATINGS_DB_PASSWORD", "") %>
    encoding: utf8
  season_ticket:
    base: <%= ENV.fetch("SEASON_TICKET_BASE") %>
    shuffle: str.reverse
  stripe:
    public: <%= ENV.fetch("STRIPE_PUBLIC_KEY") %>
    secret: <%= ENV.fetch("STRIPE_SECRET_KEY") %>

# Mirror upat into staging/production blocks so the same image works under
# any RAILS_ENV value Kamal might set.
staging:
  <<: *upat
production:
  <<: *upat
